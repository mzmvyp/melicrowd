server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default sendoff: nginx serve index.html automaticamente em "/".
    location / {
        try_files $uri $uri/ =404;
    }

    # Dev: não cachear JSX/HTML — backend evolui rápido.
    location ~* \.(jsx|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }
}
