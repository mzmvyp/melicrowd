# =============================================================================
# Redis — configuração para o checkpointer LangGraph e estado live de agentes.
# Persistência AOF (everysec) para sobreviver a restart sem perder sessões.
# =============================================================================

bind 0.0.0.0
protected-mode no
port 6379

# AOF é mais durável que RDB para dados curta-duração com TTL.
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Limite de memória — eviction para chaves expiradas primeiro.
maxmemory 512mb
maxmemory-policy volatile-lru

# Logs apenas eventos importantes (não polui stdout do container).
loglevel notice

# Habilita keyspace events para que o checkpointer LangGraph saiba
# quando sessões expiram via TTL.
notify-keyspace-events Ex
