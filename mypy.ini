[mypy]
python_version = 3.11
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_decorators = false
plugins = pydantic.mypy

# Exclude generated migration scripts
exclude = (?x)(
    infra/postgres/migrations/versions/.*
  | tests/.*
  | build/.*
  | dist/.*
  )

[mypy-tests.*]
ignore_errors = true

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# Libraries without type stubs (tolerated, but list explicitly)
[mypy-uvloop.*]
ignore_missing_imports = true

[mypy-streamlit.*]
ignore_missing_imports = true

[mypy-locust.*]
ignore_missing_imports = true

[mypy-prometheus_client.*]
ignore_missing_imports = true

[mypy-aiokafka.*]
ignore_missing_imports = true

[mypy-testcontainers.*]
ignore_missing_imports = true

[mypy-langgraph.*]
ignore_missing_imports = true

[mypy-langchain_ollama.*]
ignore_missing_imports = true
