---
# Pre-commit hooks. Instale com `pre-commit install`.
# Roda automaticamente em `git commit`. Para rodar manualmente: `pre-commit run --all-files`.
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]  # docker-compose may use !reset/!override anchors
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-settings>=2.7
        args: ["--config-file=mypy.ini"]
        files: ^src/melicrowd/

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest unit (fast subset)
        entry: poetry run pytest tests/unit -x --tb=short -q
        language: system
        pass_filenames: false
        stages: [pre-commit]
